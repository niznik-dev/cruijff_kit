name: Test Coverage

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=cruijff_kit --cov-report=html --cov-report=term-missing | tee coverage_output.txt

      - name: Extract coverage percentage
        id: coverage
        run: |
          # Parse the TOTAL line from pytest-cov output
          COVERAGE=$(grep '^TOTAL' coverage_output.txt | awk '{print $NF}' | tr -d '%')
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"

          # Set color based on thresholds
          if [ "$COVERAGE" -ge 70 ]; then
            echo "color=green" >> "$GITHUB_OUTPUT"
          elif [ "$COVERAGE" -ge 50 ]; then
            echo "color=yellow" >> "$GITHUB_OUTPUT"
          else
            echo "color=red" >> "$GITHUB_OUTPUT"
          fi

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 446aebdc3da3cde75a7124376f985759
          filename: cruijff_kit_coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          color: ${{ steps.coverage.outputs.color }}

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30
