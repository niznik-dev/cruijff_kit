name: Nightly Torchtune Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'  # 2:00 AM EST / 3:00 AM EDT

permissions:
  contents: read

jobs:
  torchtune-smoke:
    runs-on: [self-hosted, della-cruijff-gpu]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select GPU
        run: |
          source ~/scripts/select_gpu.sh
          echo "CUDA_VISIBLE_DEVICES=$CUDA_VISIBLE_DEVICES" >> "$GITHUB_ENV"

      - name: Run torchtune smoke test
        run: |
          source /etc/profile.d/modules.sh
          module load anaconda3/2025.12
          conda activate cruijff
          python tests/integration/gpu/smoke_test_torchtune.py
