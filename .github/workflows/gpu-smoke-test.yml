name: GPU Smoke Test

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * *'  # 1:30 AM EST / 2:30 AM EDT

jobs:
  gpu-test:
    runs-on: [self-hosted, della-cruijff-gpu]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select GPU
        run: |
          source ~/scripts/select_gpu.sh
          echo "CUDA_VISIBLE_DEVICES=$CUDA_VISIBLE_DEVICES" >> "$GITHUB_ENV"

      - name: Check GPU visibility
        run: |
          source /etc/profile.d/modules.sh
          module load anaconda3/2025.12
          conda activate cruijff
          python -c "
          import torch
          assert torch.cuda.is_available(), 'CUDA not available'
          print('CUDA available:', True)
          print('Device count:', torch.cuda.device_count())
          print('Device name:', torch.cuda.get_device_name(0))
          "

      - name: Load model and generate tokens
        run: |
          source /etc/profile.d/modules.sh
          module load anaconda3/2025.12
          conda activate cruijff
          python tests/integration/gpu/smoke_test_model_load.py

      - name: Verify scaffolding tools
        run: |
          source /etc/profile.d/modules.sh
          module load anaconda3/2025.12
          conda activate cruijff
          python tests/integration/gpu/smoke_test_scaffolding.py
