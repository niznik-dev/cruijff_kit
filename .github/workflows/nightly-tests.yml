name: Nightly Tests

on:
  schedule:
    # CPU tests: 1:00 AM EST / 2:00 AM EDT
    - cron: '0 6 * * *'
    # Morning rerun: 6:00 AM EST / 7:00 AM EDT
    - cron: '0 11 * * *'
  # Allow manual triggering for testing
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/ -v

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Nightly tests failed on main branch"
